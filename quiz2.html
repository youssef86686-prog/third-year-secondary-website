<script>
  const images = [
    'imgsfile/bg.png',
    'imgsfile/game/jes.png',
    'imgsfile/game/gargs.png',
    'imgsfile/game/icon.png',
    'imgsfile/game/miry.gif',
    'imgsfile/game/mena.png',
  ];

  const board = document.getElementById('game-board');
  const mistakesDisplay = document.getElementById('mistakes');
  const winMessage = document.getElementById('win-message');
  let cards = [];
  let flipped = [];
  let mistakes = 0;

  function getLabel(src) {
    const map = {
      'imgsfile/bg.png':  'العذراء مريم',
      'imgsfile/game/jes.png': 'السيد المسيح',
      'imgsfile/game/gargs.png': 'ماري جرجس',
      'imgsfile/game/icon.png': 'البابا شنودة الثالث',
      'imgsfile/game/miry.gif': 'ماري مرقس',
      'imgsfile/game/mena.png': 'ماري مينا',
    };
    return map[src] || '';
  }

  function shuffleArray(arr) {
    return arr.concat(arr).sort(() => 0.5 - Math.random());
  }

  function createCard(src) {
    const card = document.createElement('div');
    card.classList.add('card');

    const img = document.createElement('img');
    img.src = src;

    const caption = document.createElement('div');
    caption.textContent = getLabel(src);
    caption.classList.add('caption');

    card.appendChild(img);
    card.appendChild(caption);
    card.dataset.image = src;
    card.addEventListener('click', () => flipCard(card));
    return card;
  }

  function flipCard(card) {
    if (flipped.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        setTimeout(checkMatch, 500); // تأخير نصف ثانية بعد قلب بطاقتين
      }
    }
  }

  function checkMatch() {
    const [first, second] = flipped;
    if (first.dataset.image === second.dataset.image) {
      first.classList.add('matched');
      second.classList.add('matched');
      checkWin();
    } else {
      mistakes++;
      mistakesDisplay.textContent = `عدد المحاولات الخاطئة: ${mistakes}`;
      first.classList.remove('flipped');
      second.classList.remove('flipped');
    }
    flipped = [];
  }

  function checkWin() {
    if (document.querySelectorAll('.matched').length === cards.length) {
      winMessage.style.display = 'block';
    }
  }

  function initGame() {
    const shuffledImages = shuffleArray(images);
    shuffledImages.forEach(img => {
      const card = createCard(img);
      board.appendChild(card);
      cards.push(card);
    });
  }

  initGame();
</script>
