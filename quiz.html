<meta content="width=device-width, initial-scale=1.0" name="viewport"/></head>
<body>
<header>
<a class="af" href="compition.html">الرجوع</a>
</header>
<h2>من أنا؟ (شخصيات من الكتاب المقدس)</h2>
<div id="quiz-container"></div>
<button onclick="submitQuiz()" style="border-radius: 10px; scale: 1.3; width: 100px;">إنهاء</button>
<div id="resultBox">
<h3>نتيجتك:</h3>
<p id="username"></p>
<p id="score"></p>
<p id="rank"></p>
<div id="corrections"></div>
</div>
<script>
    const questions = [
      {
        question: "أنا كنت قائد جيش آرامي، أصبت بالبرص وشُفيت بعدما غسلت نفسي في نهر الأردن سبع مرات. من أنا؟",
        options: ["نُعمان السوري", "حابور", "يوآب", "أخآب"],
        answer: "نُعمان السوري"
      },
      {
        question: "أنا كنت صامتًا أمام الملك لما اتُّهمت، وقُتلت ظلمًا، وصارت قصتي رمزًا للمسيح. من أنا؟",
        options: ["يوسف", "استفانوس", "إشعياء", "حَمَل العيد"],
        answer: "يوسف"
      },
      {
        question: "كنت ملكًا حكيمًا، لكني في شيخوختي سقطت بسبب النساء الأجنبيات. من أنا؟",
        options: ["داود", "سليمان", "رحبعام", "أخاب"],
        answer: "سليمان"
      },
      {
        question: "أنا نبي بلعني الحوت وظللت في بطنه ثلاثة أيام. من أنا؟",
        options: ["إيليا", "يونان", "هوشع", "إرميا"],
        answer: "يونان"
      },
      {
        question: "أنا كنت فتاة يهودية وأصبحت ملكة فارس، وأنقذت شعبي من الإبادة. من أنا؟",
        options: ["راعوث", "أستير", "حنة", "مرثا"],
        answer: "أستير"
      }
    ];

    const quizContainer = document.getElementById('quiz-container');

    questions.forEach((q, index) => {
      let html = `<div class="question"><b>س${index + 1}:</b> ${q.question}</div>`;
      q.options.forEach(opt => {
        html += `<label class="option">
          <input type="radio" name="q${index}" value="${opt}"> ${opt}
        </label>`;
      });
      quizContainer.innerHTML += `<div>${html}</div><hr>`;
    });

    function submitQuiz() {
      let score = 0;
      let correctionsHTML = "<h4>الإجابات الخاطئة:</h4>";
      let wrongAnswers = 0;

      questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const correct = q.answer;

        if (selected && selected.value === correct) {
          score++;
        } else {
          wrongAnswers++;
          const chosen = selected ? selected.value : "لم يتم اختيار إجابة";
          correctionsHTML += `<div class='correction'>س${i + 1}: إجابتك كانت: <b>${chosen}</b><br>الإجابة الصحيحة: <b>${correct}</b></div>`;
        }
      });

      const name = localStorage.getItem('quiz_username') || "بدون اسم";
      const result = { name, score };

      let allResults = JSON.parse(localStorage.getItem('quiz_results')) || [];
      allResults.push(result);
      localStorage.setItem('quiz_results', JSON.stringify(allResults));

      const sorted = allResults.slice().sort((a, b) => b.score - a.score);
      const rank = sorted.findIndex(r => r.name === name && r.score === score) + 1;

      document.getElementById('username').innerText = `الاسم: ${name}`;
      document.getElementById('score').innerText = `الدرجة: ${score} من ${questions.length}`;
      document.getElementById('corrections').innerHTML = wrongAnswers ? correctionsHTML : "<p>كل إجاباتك صحيحة! ممتاز 👏</p>";
      document.getElementById('resultBox').style.display = 'block';
    }

    function goToResults() {
      window.location.href = 'results.html';
    }
  </script>
</body>
